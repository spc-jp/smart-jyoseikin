<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart助成金シグナル</title>
  
  <!-- ファビコンの設定 -->
  <link rel="icon" type="image/png" href="https://spc-jp.github.io/smart-jyoseikin/favicon.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome (アイコン用) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザでのJSX変換用) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    }
    /* カスタムスクロールバー */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* モバイルドロワーのアニメーション */
    .drawer-transition {
      transition: transform 0.3s ease-in-out;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // コンポーネント: ナビゲーションアイテム
    // ==========================================
    function NavItem({ iconClass, label, isActive, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg transition-colors duration-200 ${
            isActive 
              ? 'bg-blue-600 text-white shadow-md' 
              : 'text-slate-300 hover:bg-slate-800 hover:text-white'
          }`}
        >
          <i className={`${iconClass} text-lg w-6 text-center`}></i>
          <span className="font-medium text-left leading-tight">{label}</span>
        </button>
      );
    }

    // ==========================================
    // コンポーネント: KPIカード
    // ==========================================
    function KpiCard({ title, amount, subtitle, iconClass, colorClass }) {
      const bgColors = {
        blue: 'bg-blue-50 text-blue-500',
        emerald: 'bg-emerald-50 text-emerald-500',
        rose: 'bg-rose-50 text-rose-500',
      };
      return (
        <div className="bg-white rounded-xl shadow-sm p-5 md:p-6 border border-gray-100 flex flex-col justify-between">
          <div className="flex justify-between items-start mb-4">
            <h4 className="text-gray-500 font-medium text-sm">{title}</h4>
            <div className={`p-3 rounded-lg ${bgColors[colorClass]}`}>
              <i className={`${iconClass} text-xl`}></i>
            </div>
          </div>
          <div>
            <div className="text-2xl md:text-3xl font-bold text-gray-800 mb-1">{amount}</div>
            <p className="text-xs text-gray-400">{subtitle}</p>
          </div>
        </div>
      );
    }

    // ==========================================
    // タブ: ダッシュボード
    // ==========================================
    function Dashboard({ alerts, companies, grants, onStatusChange }) {
      const activeAlerts = alerts.filter(a => a.status === '未対応');
      const inProgressAlerts = alerts.filter(a => a.status === '提案中');

      return (
        <div className="space-y-6">
          <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-6 md:p-8 text-white shadow-lg flex flex-col md:flex-row items-center justify-between relative overflow-hidden">
            <div className="relative z-10 text-center md:text-left">
              <span className="inline-block px-3 py-1 bg-white/20 rounded-full text-xs md:text-sm font-bold mb-4">
                <i className="fas fa-sparkles mr-1"></i> 提案のチャンスを逃さない
              </span>
              <h3 className="text-2xl md:text-3xl font-bold mb-2">見落としていませんか？<br className="hidden md:block" />顧問先の「申請タイミング」</h3>
              <p className="text-blue-100 mt-2 text-sm md:text-base">勤怠・人事データからAIが自動検知した最新の提案シグナルです。</p>
            </div>
            <div className="hidden lg:block opacity-20 absolute -right-4 -bottom-4">
              <i className="fas fa-satellite-dish text-[10rem]"></i>
            </div>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            <KpiCard 
              title="未対応の新規シグナル" 
              amount={`${activeAlerts.length}件`} 
              subtitle="優先して確認してください"
              iconClass="fas fa-bell"
              colorClass="rose"
            />
            <KpiCard 
              title="提案中の助成金" 
              amount={`${inProgressAlerts.length}件`} 
              subtitle="顧問先へのヒアリング進行中"
              iconClass="fas fa-comments"
              colorClass="blue"
            />
            <KpiCard 
              title="今月の想定受給総額" 
              amount="約 320 万円" 
              subtitle="※提案がすべて通った場合の試算"
              iconClass="fas fa-chart-line"
              colorClass="emerald"
            />
          </div>

          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="p-4 md:p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
              <h3 className="text-base md:text-lg font-bold text-gray-800">
                <i className="fas fa-exclamation-circle text-blue-600 mr-2"></i>
                検知された提案シグナル一覧
              </h3>
            </div>
            <div className="divide-y divide-gray-100">
              {alerts.filter(a => a.status !== '対応済').map(alert => {
                const company = companies.find(c => c.id === alert.companyId);
                const grant = grants.find(g => g.id === alert.grantId);
                return (
                  <div key={alert.id} className="p-4 md:p-6 hover:bg-blue-50/30 transition-colors flex flex-col lg:flex-row gap-4 lg:gap-6 items-start lg:items-center">
                    <div className="flex flex-row lg:flex-col items-center lg:items-stretch justify-between w-full lg:w-32 shrink-0">
                      <span className={`px-3 py-1 rounded text-xs font-bold text-center ${
                        alert.status === '未対応' ? 'bg-rose-100 text-rose-700' : 'bg-blue-100 text-blue-700'
                      }`}>
                        {alert.status}
                      </span>
                      <div className="flex flex-col lg:items-center mt-0 lg:mt-2">
                        {alert.level === 'high' && (
                          <span className="text-[10px] md:text-xs font-bold text-rose-600 flex items-center lg:justify-center">
                            <i className="fas fa-fire mr-1"></i> 重要度: 高
                          </span>
                        )}
                        <span className="text-[10px] md:text-xs text-gray-400 text-center">{alert.date}</span>
                      </div>
                    </div>
                    <div className="flex-1 w-full">
                      <div className="flex flex-wrap items-center gap-2 mb-2">
                        <span className="text-xs font-bold text-gray-600 border border-gray-300 px-2 py-0.5 rounded bg-white">
                          {company?.name}
                        </span>
                        <span className="text-[10px] md:text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded flex items-center">
                          <i className="fas fa-link mr-1"></i>{company?.system}
                        </span>
                      </div>
                      <h4 className="text-base md:text-lg font-bold text-gray-900 mb-2 leading-tight">{alert.title}</h4>
                      <p className="text-xs md:text-sm text-gray-600 mb-3">{alert.message}</p>
                      <div className="inline-flex items-center bg-indigo-50 border border-indigo-100 rounded px-3 py-2 w-full sm:w-auto">
                        <i className="fas fa-file-invoice-dollar text-indigo-500 mr-2 shrink-0"></i>
                        <div>
                          <p className="text-[10px] md:text-xs text-indigo-800 font-bold leading-tight">{grant?.name}</p>
                          <p className="text-[9px] md:text-[10px] text-indigo-600 leading-tight">想定額: {grant?.amount}</p>
                        </div>
                      </div>
                    </div>
                    <div className="flex flex-row lg:flex-col gap-2 shrink-0 w-full lg:w-48">
                      {alert.status === '未対応' ? (
                        <button 
                          onClick={() => onStatusChange(alert.id, '提案中')}
                          className="flex-1 lg:w-full bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded text-xs md:text-sm font-medium transition-colors shadow-sm"
                        >
                          提案中へ
                        </button>
                      ) : (
                        <button className="flex-1 lg:w-full bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded text-xs md:text-sm font-medium transition-colors shadow-sm flex items-center justify-center">
                          <i className="fas fa-envelope mr-1 hidden sm:inline"></i> 連絡
                        </button>
                      )}
                      <button 
                        onClick={() => onStatusChange(alert.id, alert.status === '未対応' ? '詳細' : '対応済')}
                        className="flex-1 lg:w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-2 rounded text-xs md:text-sm font-medium transition-colors"
                      >
                        {alert.status === '未対応' ? '詳細' : '完了'}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // タブ: 顧問先一覧
    // ==========================================
    function CompaniesList({ companies, alerts }) {
      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="p-4 md:p-6 border-b border-gray-100 bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <h3 className="text-base md:text-lg font-bold text-gray-800">顧問先連携一覧</h3>
            <button className="w-full sm:w-auto bg-blue-600 text-white px-4 py-2 rounded text-xs md:text-sm font-medium hover:bg-blue-700">
              <i className="fas fa-plus mr-1"></i> 新規連携
            </button>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-left min-w-[600px]">
              <thead>
                <tr className="bg-gray-50 text-gray-600 text-xs md:text-sm border-b">
                  <th className="p-4 font-semibold">顧問先名</th>
                  <th className="p-4 font-semibold">従業員数</th>
                  <th className="p-4 font-semibold">連携システム</th>
                  <th className="p-4 font-semibold text-center">シグナル</th>
                  <th className="p-4 font-semibold"></th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100">
                {companies.map(c => {
                  const activeCount = alerts.filter(a => a.companyId === c.id && a.status === '未対応').length;
                  return (
                    <tr key={c.id} className="hover:bg-gray-50/50">
                      <td className="p-4 font-bold text-gray-800 text-sm">{c.name}</td>
                      <td className="p-4 text-gray-600 text-sm">{c.empCount} 名</td>
                      <td className="p-4">
                        <span className="text-[10px] md:text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded border border-gray-200">
                          {c.system}
                        </span>
                      </td>
                      <td className="p-4 text-center">
                        {activeCount > 0 ? (
                          <span className="inline-flex items-center justify-center bg-rose-100 text-rose-700 text-xs font-bold px-2 py-1 rounded-full">
                            {activeCount}
                          </span>
                        ) : (
                          <span className="text-gray-400 text-sm">-</span>
                        )}
                      </td>
                      <td className="p-4 text-right">
                        <button className="text-blue-600 text-sm hover:underline font-medium">詳細</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ==========================================
    // タブ: 助成金データベース
    // ==========================================
    function GrantsDatabase({ grants }) {
      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <h3 className="text-base md:text-lg font-bold text-gray-800">助成金データベース</h3>
            <div className="relative w-full md:w-64">
              <input type="text" placeholder="キーワード検索..." className="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
              <i className="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
            {grants.map(g => (
              <div key={g.id} className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                <h4 className="text-base md:text-lg font-bold text-blue-800 mb-2 leading-snug">{g.name}</h4>
                <div className="mb-4">
                  <span className="inline-block bg-amber-100 text-amber-800 text-[10px] md:text-xs font-bold px-2 py-1 rounded">
                    支給額: {g.amount}
                  </span>
                </div>
                <h5 className="text-[10px] md:text-xs font-bold text-gray-500 mb-1">主な対象要件</h5>
                <p className="text-xs md:text-sm text-gray-700 leading-relaxed bg-gray-50 p-3 rounded">
                  {g.target}
                </p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // メインアプリケーション
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const [companies] = useState([
        { id: 1, name: '株式会社テックフロンティア', empCount: 15, system: 'SmartHR' },
        { id: 2, name: 'デザインワークス合同会社', empCount: 8, system: 'MF勤怠' },
        { id: 3, name: '青木工務店', empCount: 22, system: 'ジョブカン' },
        { id: 4, name: '株式会社ライフケア', empCount: 45, system: 'KOT' },
      ]);

      const [grants] = useState([
        { id: 'g1', name: 'キャリアアップ助成金（正社員化コース）', amount: '最大80万円/人', target: '有期労働者を正規雇用労働者に転換等した事業主' },
        { id: 'g2', name: '両立支援等助成金（出生時両立支援コース）', amount: '最大60万円', target: '男性労働者の育児休業取得を推進し、取得させた事業主' },
        { id: 'g3', name: '業務改善助成金', amount: '最大600万円', target: '最低賃金を引き上げ、設備投資を行った中小企業事業主' },
      ]);

      const [alerts, setAlerts] = useState([
        { id: 101, companyId: 1, grantId: 'g1', level: 'high', title: '有期雇用6ヶ月経過者が3名います', message: '正社員転換による助成金の提案チャンスです。来月の面談での案内を推奨します。', date: '05-04', status: '未対応' },
        { id: 102, companyId: 4, grantId: 'g2', level: 'high', title: '男性の配偶者出産予定申請を検知', message: '産後パパ育休の取得推進により、両立支援等助成金が申請できる可能性があります。', date: '05-02', status: '未対応' },
        { id: 103, companyId: 2, grantId: 'g3', level: 'medium', title: 'PCの新規購入履歴を検知（API連携）', message: '賃金引き上げと組み合わせることで助成金の対象となるかヒアリングを推奨します。', date: '05-01', status: '提案中' },
      ]);

      const handleStatusChange = (alertId, newStatus) => {
        if (newStatus === '詳細') return;
        setAlerts(alerts.map(a => a.id === alertId ? { ...a, status: newStatus } : a));
      };

      const handleTabClick = (tabId) => {
        setActiveTab(tabId);
        setIsMenuOpen(false); // モバイル時はタブ選択後にメニューを閉じる
      };

      return (
        <div className="flex h-screen overflow-hidden bg-gray-50">
          
          {/* モバイル用オーバーレイ */}
          {isMenuOpen && (
            <div 
              className="fixed inset-0 bg-black/50 z-40 md:hidden" 
              onClick={() => setIsMenuOpen(false)}
            ></div>
          )}

          {/* サイドバー (デスクトップ: 固定, モバイル: ドロワー) */}
          <aside className={`fixed md:relative inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col shrink-0 z-50 drawer-transition transform ${isMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
            <div className="p-6 flex items-center justify-between md:block shrink-0">
              <div className="flex items-center space-x-3">
                <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg">
                  <i className="fas fa-search text-xl text-white"></i>
                </div>
                <h1 className="text-xl font-bold tracking-wider leading-tight">Smart<br/>助成金シグナル</h1>
              </div>
              <button className="md:hidden text-slate-400" onClick={() => setIsMenuOpen(false)}>
                <i className="fas fa-times text-xl"></i>
              </button>
            </div>
            
            <nav className="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
              <NavItem 
                iconClass="fas fa-bell" 
                label="ダッシュボード" 
                isActive={activeTab === 'dashboard'} 
                onClick={() => handleTabClick('dashboard')} 
              />
              <NavItem 
                iconClass="fas fa-building" 
                label="顧問先一覧" 
                isActive={activeTab === 'companies'} 
                onClick={() => handleTabClick('companies')} 
              />
              <NavItem 
                iconClass="fas fa-database" 
                label="データベース" 
                isActive={activeTab === 'grants'} 
                onClick={() => handleTabClick('grants')} 
              />
            </nav>

            <div className="p-4 m-4 bg-slate-800 rounded-xl shrink-0">
              <div className="flex items-center space-x-2">
                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                  <i className="fas fa-user-tie text-xs"></i>
                </div>
                <div className="overflow-hidden">
                  <p className="text-[10px] text-slate-400 truncate">スマート社労士法人</p>
                  <p className="text-sm font-medium truncate">担当者：佐藤</p>
                </div>
              </div>
            </div>
          </aside>

          {/* メインエリア */}
          <div className="flex-1 flex flex-col min-w-0 h-full">
            <header className="bg-white shadow-sm px-4 md:px-8 py-3 md:py-4 flex justify-between items-center sticky top-0 z-30 shrink-0">
              <div className="flex items-center">
                <button 
                  className="md:hidden mr-3 p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors"
                  onClick={() => setIsMenuOpen(true)}
                >
                  <i className="fas fa-bars text-lg"></i>
                </button>
                <h2 className="text-lg md:text-2xl font-bold text-gray-800 truncate">
                  {activeTab === 'dashboard' && 'シグナル'}
                  {activeTab === 'companies' && '顧問先一覧'}
                  {activeTab === 'grants' && 'データベース'}
                </h2>
              </div>
              <div className="flex items-center space-x-2 md:space-x-4">
                <span className="hidden sm:flex text-[10px] md:text-sm text-gray-400 items-center">
                  <i className="fas fa-sync-alt mr-1"></i> 06:00
                </span>
                <button className="bg-blue-50 text-blue-600 border border-blue-100 px-2 md:px-3 py-1 rounded shadow-sm text-[10px] md:text-sm hover:bg-blue-100 transition-colors font-bold">
                  手動同期
                </button>
              </div>
            </header>

            <main className="p-4 md:p-8 overflow-y-auto flex-1 bg-gray-50/50">
              {activeTab === 'dashboard' && (
                <Dashboard alerts={alerts} companies={companies} grants={grants} onStatusChange={handleStatusChange} />
              )}
              {activeTab === 'companies' && (
                <CompaniesList companies={companies} alerts={alerts} />
              )}
              {activeTab === 'grants' && (
                <GrantsDatabase grants={grants} />
              )}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
