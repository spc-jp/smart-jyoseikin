<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Smart助成金シグナル | AI提案検知</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
    body { font-family: 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white min-h-screen p-6 hidden md:block">
      <div class="flex items-center space-x-3 mb-10">
        <i class="fas fa-yen-sign text-blue-500 text-2xl"></i>
        <h1 class="font-bold text-lg leading-tight">Smart<br/>助成金シグナル</h1>
      </div>
      <nav class="space-y-4">
        <a href="#" class="flex items-center text-blue-400 font-bold bg-blue-500/10 p-3 rounded-xl">
          <i class="fas fa-satellite-dish mr-3"></i> 提案アラート
        </a>
        <a href="#" class="flex items-center text-slate-400 p-3 rounded-xl hover:bg-white/5 transition-colors">
          <i class="fas fa-building mr-3"></i> 顧問先一覧
        </a>
        <a href="#" class="flex items-center text-slate-400 p-3 rounded-xl hover:bg-white/5 transition-colors">
          <i class="fas fa-database mr-3"></i> 助成金DB
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 md:p-12">
      <header class="flex justify-between items-center mb-10">
        <h2 class="text-2xl font-bold text-slate-800">最新のアラートシグナル</h2>
        <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-bold border border-blue-200">
          監視中：18社
        </div>
      </header>

      <div class="grid gap-6">
        <!-- Alert 1 -->
        <div class="bg-white p-6 md:p-8 rounded-[24px] shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 group hover:border-blue-200 transition-all">
          <div class="flex items-start">
            <div class="w-12 h-12 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mr-4 shrink-0">
              <i class="fas fa-bell animate-pulse"></i>
            </div>
            <div>
              <div class="flex items-center space-x-2 mb-1">
                <span class="text-xs font-bold text-slate-400">株式会社テックフロンティア</span>
                <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded uppercase font-bold text-slate-500">勤怠連携済</span>
              </div>
              <h3 class="text-xl font-bold text-slate-900 mb-2">キャリアアップ助成金の要件を満たしました</h3>
              <p class="text-sm text-slate-500">有期雇用の従業員3名が雇用から6ヶ月を経過しました。正社員化への転換提案のベストタイミングです。</p>
            </div>
          </div>
          <div class="w-full md:w-auto">
            <button class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-600/20 transition-all">提案書を作成</button>
          </div>
        </div>

        <!-- Alert 2 -->
        <div class="bg-white p-6 md:p-8 rounded-[24px] shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 hover:border-blue-200 transition-all">
          <div class="flex items-start">
            <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mr-4 shrink-0">
              <i class="fas fa-info-circle"></i>
            </div>
            <div>
              <div class="flex items-center space-x-2 mb-1">
                <span class="text-xs font-bold text-slate-400">デザインワークス合同会社</span>
                <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded uppercase font-bold text-slate-500">人事連携済</span>
              </div>
              <h3 class="text-xl font-bold text-slate-900 mb-2">両立支援等助成金（育休）の可能性</h3>
              <p class="text-sm text-slate-500">男性従業員から配偶者の出産予定申請がありました。産後パパ育休の取得推進により助成金の対象となります。</p>
            </div>
          </div>
          <div class="w-full md:w-auto text-center">
            <button class="text-blue-600 font-bold hover:underline">詳細を確認 <i class="fas fa-arrow-right text-xs"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
